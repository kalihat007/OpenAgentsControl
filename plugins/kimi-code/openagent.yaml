      # Direct Kimi Usage

      This adapter is for Kimi CLI direct execution:

      ```bash
      kimi --work-dir . --agent-file ~/.kimi/agents/openagents-control/openagent.yaml
      ```

      If the user passes `--model`, honor that explicit Kimi choice. Otherwise, inherit the
      Kimi default model from `~/.kimi/config.toml`.
